<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convertisseur de température</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app">
        <h1>Convertisseur de temperature</h1>

        <div class="input-group">
            <input type="number" id="celsius-input" placeholder="Entrez led degres">
            <button id="convert-btn">Convertir</button>
        </div>

        <div id="result" class="result hidden">
            <p id="result"></p>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
